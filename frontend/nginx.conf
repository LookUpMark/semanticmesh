server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── SPA fallback — every unknown path serves index.html ──────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy API, health, and docs to the FastAPI backend ───────────────────
    location ~ ^/(api|health|docs|redoc|openapi\.json) {
        # Use Docker's internal DNS resolver with lazy resolution so nginx
        # does not fail at startup if the "api" container is not yet ready.
        resolver        127.0.0.11 valid=10s;
        set $upstream   http://api:8000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Support long-running build jobs (up to 30 min)
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # ── Compression ───────────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── Cache static assets ───────────────────────────────────────────────────
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
    }
}
